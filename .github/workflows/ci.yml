# School Kit — CI
#
# Runs on every PR opened against `main` and every push to `main`.
# Closes Phase 0 acceptance criterion #9 (CI passes on every PR).
#
# Single job by design. Splitting into parallel lint / typecheck / test jobs
# would save ~20s of wall-clock but cost 2× a 60s cold `pnpm install` per
# extra runner. With the Phase 0 test suite (117 backend tests, ~30s),
# sequential-in-one-job is the cheaper and simpler win. Captured as a
# deferred optimisation in docs/deferred.md ("Multi-job parallelism in CI").

name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Pre-empt GitHub's 2026-06-02 forced migration of Node 20 actions to Node 24.
# actions/checkout@v4 and pnpm/action-setup@v4 still declare runtime node20 in
# their action.yml; this flag opts them into the new runtime now so we surface
# any incompatibilities here rather than as a surprise breakage on June 2nd.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    name: lint + typecheck + test + build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Service containers mirror local docker-compose.yml. We use the
    # pgvector/pgvector:pg16 image (not vanilla postgres:16) because Prisma's
    # schema declares the `vector` extension and we'd otherwise need to
    # apt-install the extension binary on a stock image. Note that GH Actions
    # service containers cannot mount host volumes at start time, so the init
    # SQL under infra/postgres/init/ is applied via psql in a step below
    # rather than as docker-entrypoint-initdb.d.
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: school_kit
          POSTGRES_PASSWORD: school_kit
          POSTGRES_DB: school_kit
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U school_kit -d school_kit"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # The render integration spec (slice 5 cp2) needs real Chromium. Puppeteer's
      # postinstall downloads Chrome only on a pnpm-store cache MISS; `cache: pnpm`
      # above caches the pnpm STORE keyed on the lockfile, so a lockfile-unchanged
      # PR restores a warm store, pnpm SKIPS the postinstall, and ~/.cache/puppeteer
      # (never part of that cache) is empty → "Could not find Chrome". Restoring the
      # browser cache BEFORE install lets a present Chrome short-circuit the
      # postinstall download; the explicit install step below is the belt that
      # guarantees it regardless of cache state.
      - name: Cache Puppeteer browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: puppeteer-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Explicit Chrome install — idempotent (a no-op when the cache above hit).
      # Installs the exact Chrome build puppeteer 25.x expects into
      # ~/.cache/puppeteer, independent of the pnpm store cache.
      - name: Install Chrome for Puppeteer
        run: pnpm --filter @school-kit/api exec puppeteer browsers install chrome

      # Why this step exists: apps/api's test script is
      #   `dotenv -e ../../.env -- vitest run`
      # which errors out if `.env` is missing. We write a CI-only `.env` so
      # the existing test command works unchanged. None of the keys here are
      # real — Sentry/PostHog DSNs are deliberately blank (the no-op-when-DSN-
      # empty contract was verified in Slice 8a), and Anthropic/Paystack/etc.
      # are never called from tests.
      #
      # This step becomes unnecessary once we land the shared test bootstrap
      # tracked in docs/deferred.md ("Convert from dotenv-cli test wrapper to
      # a shared test bootstrap"). Remove this whole step in that PR.
      - name: Write CI .env
        run: |
          cat > .env <<'EOF'
          NODE_ENV=test
          DATABASE_URL=postgresql://app_user:app_user@localhost:5432/school_kit?schema=public
          DIRECT_URL=postgresql://school_kit:school_kit@localhost:5432/school_kit?schema=public
          REDIS_URL=redis://localhost:6379
          BETTER_AUTH_SECRET=ci-test-secret-not-used-for-real-auth-0000000000000000
          BETTER_AUTH_URL=http://localhost:3001
          API_PORT=4000
          API_URL=http://localhost:4000
          CORS_ORIGIN=http://localhost:3001
          CORS_ORIGIN_PORTAL=http://localhost:3002
          WEB_BASE_URL=http://localhost:3001
          NEXT_PUBLIC_API_URL=http://localhost:4000/api/v1
          ANTHROPIC_API_KEY=sk-ant-not-used-in-ci
          PAYSTACK_SECRET_KEY=sk_test_not_used_in_ci
          PAYSTACK_PUBLIC_KEY=pk_test_not_used_in_ci
          TERMII_API_KEY=not-used-in-ci
          TERMII_SENDER_ID=SchoolKit
          RESEND_API_KEY=re_not_used_in_ci
          R2_ACCOUNT_ID=not-used-in-ci
          R2_ACCESS_KEY_ID=not-used-in-ci
          R2_SECRET_ACCESS_KEY=not-used-in-ci
          R2_BUCKET=school-kit-ci
          SENTRY_DSN_API=
          NEXT_PUBLIC_SENTRY_DSN=
          SENTRY_ENVIRONMENT=ci
          NEXT_PUBLIC_POSTHOG_KEY=
          NEXT_PUBLIC_POSTHOG_HOST=https://us.i.posthog.com
          EOF

      # Postgres service containers don't support docker-entrypoint-initdb.d
      # volume mounts in GH Actions, so we apply the same SQL that docker-compose
      # auto-runs locally. Both scripts are idempotent.
      - name: Apply DB extensions + app_user role
        env:
          PGPASSWORD: school_kit
        run: |
          psql -h localhost -U school_kit -d school_kit -v ON_ERROR_STOP=1 \
            -f infra/postgres/init/01-extensions.sql
          psql -h localhost -U school_kit -d school_kit -v ON_ERROR_STOP=1 \
            -f infra/postgres/init/02-app-role.sql

      - name: Prisma generate
        run: pnpm --filter @school-kit/db generate

      # Compile every packages/* workspace to its dist/ output. Downstream
      # steps (seed, test, build, lint) consume these packages via their
      # compiled entry points (main/types/exports point at dist/, see
      # CLAUDE.md → ESM module resolution). Without this step, the seed
      # script's `import from "@school-kit/types"` resolves to a missing
      # dist/index.js on a fresh CI runner. Locally, dist/ survives from
      # a prior `pnpm build` and hides the gap. apps/* are excluded —
      # they're built later or run directly from source (Next, Vitest+SWC).
      #
      # NOTE: Ordering matters. Prisma generate MUST run before this step
      # because packages/db/src/* imports from ../generated/client/ — if
      # the client isn't generated, packages/db's tsc -p tsconfig.json
      # fails with ERR_MODULE_NOT_FOUND on the generated path.
      - name: Build workspace packages
        run: pnpm -r --filter "./packages/*" build

      - name: Prisma migrate deploy
        run: pnpm --filter @school-kit/db migrate:deploy

      # Migrations create schema; seeds populate reference data the app code
      # assumes exists. Tests in apps/api call AuthService.signupOwner which
      # looks up the 'owner' system role by key — without this step, 31/117
      # tests fail with "System role 'owner' is not seeded." Seed is
      # idempotent (findFirst + update OR create) and only touches the
      # non-RLS `roles` table, so it's safe to re-run on every CI build.
      - name: Seed DB (system roles)
        run: pnpm --filter @school-kit/db seed

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build (web)
        run: pnpm --filter @school-kit/web build

      # Phase 4 slice 1 CP1 — apps/portal has no dependent tests/E2E yet, but
      # a build-passes check is the cheapest possible regression gate for a
      # brand-new Next.js app until slice 2 gives it real logic to test.
      - name: Build (portal)
        run: pnpm --filter @school-kit/portal build

  # Slice 9 — Playwright E2E smoke. Closes Phase 0 acceptance criterion #8.
  # Runs sequentially after `ci` (needs: ci) — Phase 0 wall-clock isn't
  # tight enough to justify the extra ~60s install cost on a parallel
  # runner. Captured as a deferred optimisation when the test suite or
  # CI critical path grows. The DB-setup steps duplicate the ci job by
  # design; a composite action only pays off at 3+ consumers.
  e2e:
    name: e2e (Playwright)
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: school_kit
          POSTGRES_PASSWORD: school_kit
          POSTGRES_DB: school_kit
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U school_kit -d school_kit"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Same .env shape the ci job above writes — kept verbatim so each job
      # is self-contained. See the ci job's "Write CI .env" comment for the
      # deferral that will collapse this duplication.
      - name: Write CI .env
        run: |
          cat > .env <<'EOF'
          NODE_ENV=test
          DATABASE_URL=postgresql://app_user:app_user@localhost:5432/school_kit?schema=public
          DIRECT_URL=postgresql://school_kit:school_kit@localhost:5432/school_kit?schema=public
          REDIS_URL=redis://localhost:6379
          BETTER_AUTH_SECRET=ci-test-secret-not-used-for-real-auth-0000000000000000
          BETTER_AUTH_URL=http://localhost:3001
          API_PORT=4000
          API_URL=http://localhost:4000
          CORS_ORIGIN=http://localhost:3001
          WEB_BASE_URL=http://localhost:3001
          NEXT_PUBLIC_API_URL=http://localhost:4000/api/v1
          ANTHROPIC_API_KEY=sk-ant-not-used-in-ci
          PAYSTACK_SECRET_KEY=sk_test_not_used_in_ci
          PAYSTACK_PUBLIC_KEY=pk_test_not_used_in_ci
          TERMII_API_KEY=not-used-in-ci
          TERMII_SENDER_ID=SchoolKit
          RESEND_API_KEY=re_not_used_in_ci
          R2_ACCOUNT_ID=not-used-in-ci
          R2_ACCESS_KEY_ID=not-used-in-ci
          R2_SECRET_ACCESS_KEY=not-used-in-ci
          R2_BUCKET=school-kit-ci
          SENTRY_DSN_API=
          NEXT_PUBLIC_SENTRY_DSN=
          SENTRY_ENVIRONMENT=ci
          NEXT_PUBLIC_POSTHOG_KEY=
          NEXT_PUBLIC_POSTHOG_HOST=https://us.i.posthog.com
          EOF

      - name: Apply DB extensions + app_user role
        env:
          PGPASSWORD: school_kit
        run: |
          psql -h localhost -U school_kit -d school_kit -v ON_ERROR_STOP=1 \
            -f infra/postgres/init/01-extensions.sql
          psql -h localhost -U school_kit -d school_kit -v ON_ERROR_STOP=1 \
            -f infra/postgres/init/02-app-role.sql

      - name: Prisma generate
        run: pnpm --filter @school-kit/db generate

      - name: Build workspace packages
        run: pnpm -r --filter "./packages/*" build

      - name: Prisma migrate deploy
        run: pnpm --filter @school-kit/db migrate:deploy

      - name: Seed DB (system roles)
        run: pnpm --filter @school-kit/db seed

      # Cache chromium (~110 MB) keyed on the e2e workspace's pinned
      # @playwright/test version. A bump to the playwright version
      # invalidates the cache; otherwise we reuse the existing browser
      # download.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('e2e/package.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright chromium
        run: pnpm --filter @school-kit/e2e exec playwright install --with-deps chromium

      # webServer in playwright.config.ts spawns the api + web dev servers
      # (reuseExistingServer: false in CI). CI=true bumps retries to 2
      # for resilience against transient slow-compile flakes.
      - name: Run Playwright tests
        env:
          CI: "true"
        run: pnpm --filter @school-kit/e2e test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            e2e/playwright-report
            e2e/test-results
          retention-days: 7
